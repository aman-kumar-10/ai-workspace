<footer class="chat-input-section">

    <div class="input-wrapper">

        <!-- Left Actions -->

        <div class="input-actions">

            <button
                id="attachBtn"
                class="action-btn"
                title="Attach File (Coming Soon)">

                <i class="bi bi-paperclip"></i>

            </button>

            <button
                id="promptBtn"
                class="action-btn"
                title="Prompt Library">

                <i class="bi bi-journal-text"></i>

            </button>

        </div>

        <!-- Textarea -->

        <div class="message-box">

            <textarea
                id="message"
                rows="1"
                maxlength="5000"
                placeholder="Message AI Workspace..."></textarea>

            <div class="message-footer">

                <div class="message-hint">

                    <small>

                        Press <strong>Enter</strong> to send •
                        <strong>Shift + Enter</strong> for a new line

                    </small>

                </div>

                <div class="message-counter">

                    <span id="charCount">

                        0

                    </span>

                    /

                    5000

                </div>

            </div>

        </div>

        <!-- Right Actions -->

        <div class="send-actions">

            <button
                id="stopBtn"
                class="action-btn d-none"
                title="Stop Generation">

                <i class="bi bi-stop-fill"></i>

            </button>

            <button
                id="sendBtn"
                class="send-btn"
                title="Send Message">

                <i class="bi bi-send-fill"></i>

            </button>

        </div>

    </div>

    <div class="footer-note">

        <i class="bi bi-info-circle"></i>

        <span>

            AI can make mistakes. Verify important information before using it.

        </span>

    </div>

</footer>
