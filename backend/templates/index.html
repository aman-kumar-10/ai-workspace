<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Workspace</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>

</head>

<body>

    <div class="app">

        <!-- ================= Sidebar ================= -->

        <aside class="sidebar">

            <div class="logo">

                <i class="bi bi-stars"></i>

                <span>AI Workspace</span>

            </div>

            <button id="newChatBtn" class="new-chat">

                <i class="bi bi-plus-lg"></i>

                New Chat

            </button>

            <div class="sidebar-title">

                Recent Chats

            </div>

            <div class="chat-list">

                <div class="chat-item active">

                    <i class="bi bi-chat-left-text"></i>

                    Welcome

                </div>

                <div class="chat-item">

                    <i class="bi bi-chat-left-text"></i>

                    Python

                </div>

                <div class="chat-item">

                    <i class="bi bi-chat-left-text"></i>

                    Docker

                </div>

                <div class="chat-item">

                    <i class="bi bi-chat-left-text"></i>

                    AI Journey

                </div>

            </div>

            <div class="sidebar-bottom">

                <div class="model-info">

                    <i class="bi bi-cpu"></i>

                    Gemini 2.5 Flash

                </div>

            </div>

        </aside>

        <!-- ================= Main ================= -->

        <main class="main">

            <!-- Header -->

            <header class="header">

                <div>

                    <h3>AI Workspace</h3>

                    <small>Build. Learn. Explore AI.</small>

                </div>

                <button class="theme-btn">

                    <i class="bi bi-moon"></i>

                </button>

            </header>

            <!-- Chat -->

            <section id="chatBox" class="chat-container">

                <div class="message ai">

                    <div class="avatar">

                        🤖

                    </div>

                    <div class="bubble">

                        <strong>Welcome to AI Workspace!</strong>

                        <br><br>

                        I'm powered by Google Gemini.

                        <br><br>

                        Ask me anything to get started.

                    </div>

                </div>

            </section>

            <!-- Input -->

            <footer class="input-container">

                <textarea id="message" rows="2" placeholder="Message AI Workspace..."></textarea>

                <button id="sendBtn">

                    <i class="bi bi-send-fill"></i>

                </button>

            </footer>

        </main>

    </div>

    <script src="/static/js/app.js"></script>

</body>

</html>
